<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Soundboard - Premium Dark Glass Sound App</title>
  <meta name="description" content="A premium dark glassmorphism Browser Soundboard featuring custom-synthesized sounds, volume filters, keyboard shortcuts, and full offline fallback functionality.">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="theme-dark">

  <div class="container">
    
    <!-- HEADER -->
    <header>
      <div class="header-top">
        <div class="logo-section">
          <!-- Premium Sound Wave / Board Logo -->
          <svg viewBox="0 0 24 24" class="logo-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M17 5v14M22 9v6M7 8v8M2 10v4"/>
          </svg>
          <div class="app-title-container">
            <h1 class="app-title">Browser Soundboard</h1>
            <p class="app-subtitle">Premium Audio Hub & Custom Soundboard</p>
          </div>
        </div>
        
        <!-- Theme Toggle Button -->
        <button id="theme-toggle-btn" class="theme-toggle" aria-label="Toggle Theme">
          <svg viewBox="0 0 24 24" class="theme-icon" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <!-- Search & Status Bar -->
      <div class="search-container">
        <svg viewBox="0 0 24 24" class="search-icon" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-bar" class="search-input" placeholder="Search sounds by name or category..." aria-label="Search sounds">
      </div>
      
      <!-- Current Count -->
      <div id="sound-counter">12 Sounds available</div>
    </header>

    <!-- GLOBAL CONTROLS -->
    <section class="global-controls-panel" aria-label="Global soundboard controls">
      <div class="volume-master-container">
        <span class="volume-slider-label">Master Volume</span>
        <input type="range" id="master-volume" class="range-slider" min="0" max="1" step="0.05" value="1.0" aria-label="Master volume">
      </div>
      
      <div class="global-buttons">
        <button id="mute-all-btn" class="btn" aria-label="Mute all sounds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          Mute All
        </button>
        <button id="stop-all-btn" class="btn btn-danger" aria-label="Stop all playing sounds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          </svg>
          Stop All
        </button>
        <button id="play-random-btn" class="btn btn-primary" aria-label="Play a random sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Play Random
        </button>
        <button id="shuffle-btn" class="btn" aria-label="Shuffle and play a combination of sounds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            <line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
          Shuffle
        </button>
        <button id="reset-btn" class="btn" aria-label="Reset soundboard configurations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
          Reset
        </button>
      </div>
    </section>

    <!-- CATEGORY FILTERS -->
    <nav id="filter-tabs" class="filter-tabs" aria-label="Filter sounds by category"></nav>

    <!-- MAIN SOUND GRID -->
    <main id="soundboard-grid" class="soundboard-grid" aria-label="Sound cards list"></main>

  </div>

  <!-- NOW PLAYING FOOTER PANEL -->
  <footer id="now-playing-panel" class="now-playing-panel" aria-label="Now playing details">
    <div class="now-playing-info">
      <div id="now-playing-name" class="now-playing-title">No sound playing</div>
      <div class="now-playing-status-container">
        <span class="status-badge"></span>
        <span id="now-playing-status" class="now-playing-status">Inactive</span>
      </div>
    </div>

    <div class="now-playing-progress-wrapper">
      <span id="now-playing-current" class="now-playing-time">0:00</span>
      <div id="now-playing-progress" class="now-playing-progress" aria-label="Seek sound">
        <div id="now-playing-fill" class="now-playing-fill"></div>
      </div>
      <span id="now-playing-duration" class="now-playing-time">0:00</span>
    </div>

    <div class="now-playing-controls">
      <button id="now-playing-play" class="control-btn" aria-label="Play now playing">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button id="now-playing-pause" class="control-btn" aria-label="Pause now playing" style="display: none;">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button id="now-playing-stop" class="control-btn" aria-label="Stop playing">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16"/></svg>
      </button>
      <button id="now-playing-loop" class="control-btn" aria-label="Toggle loop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
      </button>
      
      <div class="now-playing-volume-container">
        <svg viewBox="0 0 24 24" class="volume-icon" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input type="range" id="now-playing-volume" class="now-playing-volume-slider" min="0" max="1" step="0.05" value="1.0" aria-label="Volume">
      </div>
    </div>
  </footer>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Core Scripts -->
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
