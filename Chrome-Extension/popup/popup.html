<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat-ify Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" class="logo-icon">
          <path d="M12 3c-1.2 0-2.4.3-3.5.9L5.8 2.2C5.4 1.9 4.8 2 4.5 2.4s-.2 1 .2 1.3L6.8 6c-1.8 1.6-3 4-3 6.6 0 4.8 3.8 8.7 8.5 8.7s8.5-3.9 8.5-8.7c0-2.6-1.2-5-3-6.6l2.1-2.3c.4-.4.3-1-.1-1.3-.4-.4-1-.3-1.3.1L15.5 3.9C14.4 3.3 13.2 3 12 3zm0 15c-3.6 0-6.5-2.7-6.5-6s2.9-6 6.5-6 6.5 2.7 6.5 6-2.9 6-6.5 6z"/>
        </svg>
        <h1>Cat-ify</h1>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <main class="main-content">
      <div class="card status-card">
        <div class="status-info">
          <span class="status-label">Tab Status</span>
          <span id="statusText" class="status-value enabled">Active</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleState" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <button id="refreshBtn" class="btn btn-primary" title="Reload cat images on this page">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        <span>Refresh Cats</span>
      </button>
    </main>

    <footer class="footer">
      <p>Made for cat lovers</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
