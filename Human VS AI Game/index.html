<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human vs AI Challenge - Detection Training Protocol</title>
  <meta name="description" content="An interactive game to determine whether image, text, code, voice, or artwork was generated by a Human or AI.">

  <!-- Google Fonts: Orbitron (Futuristic Titles), Rajdhani (UI Elements), Share Tech Mono (Codes), Inter (Body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Chart.js CDN for Statistics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <!-- Cascading Style Sheets -->
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/home.css">
  <link rel="stylesheet" href="./css/game.css">
  <link rel="stylesheet" href="./css/leaderboard.css">
  <link rel="stylesheet" href="./css/statistics.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>

  <!-- Futuristic Animated Background Canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="ambient-aurora"></div>

  <!-- Main SPA Layout Container -->
  <div class="app-wrapper">
    
    <!-- Unified Application Header -->
    <header class="site-header">
      <div class="header-logo">
        <a href="#home" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
          <i class="fa fa-microchip"></i>
          <span>DETECTION CORE</span>
        </a>
      </div>
      <div class="header-controls">
        <!-- Quick Stats panel -->
        <a href="#statistics" class="btn btn-outline btn-mini" aria-label="Open Analytics Summary">
          <i class="fa fa-chart-bar"></i>
        </a>
        <a href="#settings" class="btn btn-outline btn-mini" aria-label="Open System Settings">
          <i class="fa fa-cog"></i>
        </a>
      </div>
    </header>

    <!-- App Viewport Mount -->
    <main class="main-container">
      <div id="app-viewport">
        <!-- SPA views injected dynamically here -->
      </div>
    </main>

  </div>

  <!-- HTML Live Announcer Live Region for accessibility -->
  <div id="sr-announcer" aria-live="polite" aria-atomic="true" class="sr-only" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;"></div>

  <!-- App Bootstrapper Module Entry Point -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
